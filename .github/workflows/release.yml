name: Build Alpha Release APK (Direct)

on:
  push:
    branches:
      - alpha

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        # assembleRelease strips out heavy debug symbols from native libraries like sherpa-onnx
        run: ./gradlew assembleRelease --no-daemon --warning-mode all

      - name: Generate Release Tag
        id: generate_tag
        run: echo "RELEASE_TAG=alpha-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Upload Direct APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Alpha Release ${{ env.RELEASE_TAG }}
          body: "Direct Release APK optimized for size. 32-bit architectures removed."
          # Changed path to release folder
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
