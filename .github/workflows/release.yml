name: Build Optimized Main APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Optimized APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Build Minified Release APK
        # Skipping tests and lint to save RAM during the build process
        run: ./gradlew assembleRelease --no-daemon -x test -x lint

      - name: Upload Direct APK (Overwrite Latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: Latest Main Build
          body: "Auto-updated optimized APK. 64-bit universal build. RAM issues bypassed."
          files: app/build/outputs/apk/release/*.apk
          overwrite: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
